version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: revisionai-postgres
    environment:
      POSTGRES_DB: revisionai
      POSTGRES_USER: revisionai
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revisionai -d revisionai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: revisionai-azurite
    ports:
      - "10000:10000"  # Blob Storage
      - "10001:10001"  # Queue Storage
      - "10002:10002"  # Table Storage
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  azurite_data:
    driver: local